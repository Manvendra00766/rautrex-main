name: Backend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff mypy pytest pytest-asyncio httpx
        
    - name: Lint with Ruff
      working-directory: ./backend
      run: |
        ruff check . || echo "Ruff warnings found"
        
    - name: Type check with mypy
      working-directory: ./backend
      run: |
        mypy . --ignore-missing-imports || echo "Mypy warnings found"
        
    - name: Test with pytest
      working-directory: ./backend
      env:
        DATABASE_URL: "sqlite+aiosqlite:///./test_rautrex.db"
        ENVIRONMENT: "test"
        SUPABASE_URL: "https://mock.supabase.co"
        SUPABASE_ANON_KEY: "mock-key"
        SUPABASE_SERVICE_ROLE_KEY: "mock-service-role-key"
      run: |
        pytest test_all_endpoints.py -v
